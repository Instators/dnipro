name: Dnipro CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ANCHOR_VERSION: 0.31.1
  SOLANA_VERSION: 2.2.20
  NODE_VERSION: 20

jobs:
  # ── Rust / Anchor build ─────────────────────────────────────────────────────
  anchor-build:
    name: Anchor Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            anchor-cli --tag v${{ env.ANCHOR_VERSION }} --locked

      - name: Set up keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Cargo fmt check
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Anchor build
        run: anchor build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build
          path: target/deploy/*.so

  # ── TypeScript / Node ───────────────────────────────────────────────────────
  sdk-build:
    name: SDK Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build SDK
        run: yarn build:sdk

      - name: Build CLI
        run: yarn build:cli

      - name: Type-check web
        run: cd web && npx tsc --noEmit

  # ── Integration tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Localnet)
    runs-on: ubuntu-latest
    needs: anchor-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            anchor-cli --tag v${{ env.ANCHOR_VERSION }} --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set up keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: anchor-build
          path: target/deploy/

      - name: Run integration tests
        run: anchor test --skip-build
        env:
          ANCHOR_PROVIDER_URL: http://localhost:8899
          ANCHOR_WALLET: ~/.config/solana/id.json

  # ── Web build ────────────────────────────────────────────────────────────────
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: sdk-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build web
        run: yarn build:web
        env:
          NEXT_PUBLIC_RPC_URL: https://api.mainnet-beta.solana.com
          NEXT_PUBLIC_NETWORK: mainnet-beta
          NEXT_PUBLIC_MOCK_DATA: 'true'
