[toolchain]
anchor_version = "0.31.1"
solana_version = "2.2.20"

[features]
seeds = true
skip-lint = false

[programs.localnet]
dispatcher  = "DniproDispatcher1111111111111111111111111111"
registry    = "DniproRegistry11111111111111111111111111111"
kamino_adapter   = "DniproKamino111111111111111111111111111111"
marginfi_adapter = "DniproMarginFi1111111111111111111111111111"
jupiter_adapter  = "DniproJupiter11111111111111111111111111111"
maple_adapter    = "DniproMaple111111111111111111111111111111"
drift_adapter    = "DniproDrift111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
